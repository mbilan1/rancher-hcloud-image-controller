# golangci-lint configuration — hcloud-image-controller
#
# DECISION: PARANOID linter set for a high-reliability infrastructure controller.
# Why: This controller manages infrastructure (Packer builds, Hetzner snapshots).
#      Bugs cause real cost (orphaned servers, failed provisioning). Every possible
#      class of defect is checked. No shortcuts.

version: "2"

linters:
  default: none
  enable:
    # ── Correctness ──────────────────────────────────────────────────────────
    - errcheck       # unchecked errors
    - govet          # Go vet checks
    - staticcheck    # comprehensive static analysis (includes gosimple, stylecheck)
    - ineffassign    # useless assignments
    - unused         # unused code
    - bodyclose      # unclosed HTTP response bodies
    - nilerr         # returning nil error after checking err != nil
    - noctx          # HTTP requests must use context
    - exhaustive     # exhaustive switch statements over enums
    - copyloopvar    # loop variable capture bugs
    - durationcheck  # bad time.Duration multiplications

    # ── Security ─────────────────────────────────────────────────────────────
    - gosec          # security-oriented checks

    # ── Style & Consistency ──────────────────────────────────────────────────
    - misspell       # typos in comments/strings
    - unconvert      # unnecessary type conversions
    - unparam        # unused function parameters
    - whitespace     # unnecessary whitespace
    - revive         # extensible Go linter (replaces golint)
    - gocritic       # opinionated style checks
    - prealloc       # slice preallocation hints
    - godot          # comments end with a period
    - forcetypeassert # no unchecked type assertions
    - dupword        # duplicate words in comments
    - usestdlibvars  # use stdlib constants (http.StatusOK, etc.)
    - usetesting     # use t.Setenv plus other test helpers

    # ── Complexity ───────────────────────────────────────────────────────────
    - gocyclo        # cyclomatic complexity
    - nestif         # deeply nested if statements
    - funlen         # function length
    - lll            # line length

    # ── Error handling ───────────────────────────────────────────────────────
    - errorlint      # proper error wrapping (Go 1.13+)
    - wrapcheck      # errors from external packages must be wrapped

  settings:
    exhaustive:
      default-signifies-exhaustive: true
    funlen:
      lines: 80            # PARANOID: functions must be short.
      statements: 50
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
        - experimental      # PARANOID: enable experimental checks too.
      disabled-checks:
        # NOTE: importShadow fires on `log := log.FromContext(ctx)` which is the
        # canonical controller-runtime pattern. Disabling to avoid false positives.
        - importShadow
    gocyclo:
      min-complexity: 15   # PARANOID: tighter than default 30.
    lll:
      line-length: 140     # Reasonable for Go with long struct literals.
    nestif:
      min-complexity: 5    # PARANOID: tighter than default 5.
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: exported
          disabled: true  # Internal packages only — no public API.
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
          disabled: true  # Internal packages only.
        - name: unused-parameter
        - name: unnecessary-stmt
        - name: deep-exit
        - name: early-return
    gosec:
      # PARANOID: No exclusions. Every security finding is reviewed.
      excludes: []
    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - .Wrap(
        - .Wrapf(
      ignore-package-globs:
        - github.com/mbilan1/rancher-hcloud-image-controller/*
        # Framework calls — wrapping adds noise, not value.
        - sigs.k8s.io/controller-runtime/*
        - k8s.io/apimachinery/*
        - net/http

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Test files: relaxed on error handling and style, strict on everything else.
      - path: _test\.go
        linters:
          - errcheck
          - wrapcheck
          - unparam
          - funlen         # Test tables can be long.
          - lll            # Test assertions can be long.
          - forcetypeassert
          - godot
          - dupword

issues:
  max-issues-per-linter: 0   # PARANOID: show ALL issues, no limit.
  max-same-issues: 0         # PARANOID: show ALL duplicates.

formatters:
  enable:
    - gofmt
    - goimports
